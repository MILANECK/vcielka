<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Včielka — Foto Rámček Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#c8d8e4;color:#1a2a3a}
.icon{width:28px;height:28px;display:block;flex-shrink:0;pointer-events:none}

/* ── Full-screen canvas area ── */
#stage{position:fixed;inset:0;overflow:auto;display:flex;align-items:center;justify-content:center}
#canvas-wrap{position:relative;flex-shrink:0;display:flex;align-items:flex-start;justify-content:flex-start}
#canvas{width:900px;height:503px;position:relative;overflow:hidden;border-radius:14px;
  box-shadow:0 20px 60px rgba(0,20,50,.3);transform-origin:top left;position:absolute;top:0;left:0;
  background:#9aaabb;cursor:default;touch-action:none}
.placed-photo{position:absolute;overflow:hidden;cursor:grab}
.placed-photo img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;user-select:none}
.placed-text{position:absolute;cursor:grab;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;
  text-shadow:0 2px 8px rgba(0,0,0,.4);user-select:none;white-space:nowrap;padding:2px 4px}
#mask-overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:20;display:block;filter:drop-shadow(8px 4px 8px rgba(0,0,0,0.18)) drop-shadow(3px 1px 3px rgba(0,0,0,0.10))}
#hints-svg{position:absolute;inset:0;pointer-events:none;z-index:21}
#txt-input-wrap{position:absolute;z-index:50;display:none}
#txt-input-wrap.open{display:block}
#txt-inp{border:2.5px solid #ff00aa;border-radius:10px;padding:7px 12px;font-size:18px;font-weight:800;
  font-family:'Plus Jakarta Sans',sans-serif;background:rgba(255,255,255,.95);color:#1a2a3a;outline:none;min-width:160px}
.txt-hint-bar{font-size:10px;color:#8a9ab0;margin-top:3px}
#txt-mode-bar{display:none;position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,20,50,.78);color:#ff00aa;border-radius:999px;padding:6px 16px;
  font-size:11px;font-weight:700;pointer-events:none;white-space:nowrap;z-index:22}
#txt-mode-bar.open{display:block}

/* ── Floating button base ── */
.fb{border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform .12s,box-shadow .12s;font-family:inherit;
  box-shadow:0 3px 14px rgba(0,0,0,.18);border-radius:50%}
.fb:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(0,0,0,.24)}
.fb:active{transform:scale(.9)}
.fb-sm{width:68px;height:68px;font-size:24px}
.fb-md{width:80px;height:80px;font-size:26px}
.fb-lg{width:96px;height:96px;font-size:30px}
.c-blue{background:#005e9f;color:#fff}
.c-white{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);color:#005e9f}
.c-magenta{background:#ff00aa;color:#fff}
.c-green{background:#22b573;color:#fff}
.c-gold{background:#fdc003;color:#312f1f}
.c-danger{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);color:#b70049}
.c-logo{background:#fdc003;padding:6px;overflow:hidden}
.on-blue{background:#005e9f!important;color:#fff!important}

/* ── TOP-LEFT: Logo ── */
#float-logo{position:fixed;top:14px;left:14px;z-index:200;
  width:180px;height:180px;border-radius:50%;background:#fdc003;
  display:flex;align-items:center;justify-content:center;padding:18px;
  box-shadow:0 8px 36px rgba(253,192,3,.65);overflow:hidden;cursor:pointer}
#float-logo img{width:100%;height:auto;object-fit:contain}

/* ── TOP-RIGHT: Template selector ── */
#float-template{position:fixed;top:14px;right:14px;z-index:200;
  display:flex;align-items:center;gap:8px}
/* Large thumbnail */
#tpl-thumb-big{width:100px;height:56px;border-radius:10px;border:2.5px solid #22b573;
  overflow:hidden;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.2)}
#tpl-thumb-big img{width:100%;height:100%;object-fit:cover;display:block}
/* Small green change button */
#tpl-change-btn{width:52px;height:52px;border-radius:50%;background:#22b573;color:#fff;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(34,181,115,.4);transition:transform .12s}
#tpl-change-btn:hover{transform:scale(1.12)}
#tpl-change-btn:active{transform:scale(.9)}
/* Mask picker popup */
.mask-picker{position:absolute;top:54px;right:0;background:rgba(255,255,255,.97);
  backdrop-filter:blur(14px);border-radius:18px;padding:16px;
  box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:500;min-width:210px;display:none}
.mask-picker.open{display:block}
.picker-title{font-size:13px;font-weight:700;color:#5a7a9a;margin-bottom:11px}
.mask-option{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:12px;
  cursor:pointer;margin-bottom:4px;border:1.5px solid transparent}
.mask-option:hover{background:rgba(34,181,115,.08)}
.mask-option.active{background:rgba(34,181,115,.12);border-color:#22b573}
.mask-option img{width:66px;height:37px;border-radius:8px;object-fit:cover}
.mask-option .mn{font-size:13px;font-weight:700}
.mask-option .chk{font-size:12px;color:#22b573;margin-left:auto}
.picker-soon{font-size:10px;color:#a0b0c0;text-align:center;margin-top:9px;font-style:italic}

/* ── LEFT: Photo panel ── */
#float-photos{position:fixed;left:14px;top:50%;transform:translateY(-50%);z-index:200;
  display:flex;flex-direction:column;align-items:center;gap:12px}
/* Photos list panel */
#photos-panel{position:fixed;left:80px;top:50%;transform:translateY(-50%);
  width:210px;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);
  border-radius:22px;padding:16px;display:none;flex-direction:column;gap:10px;
  box-shadow:0 8px 32px rgba(0,94,159,.15);z-index:199;max-height:70vh}
#photos-panel.open{display:flex}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;cursor:grab;user-select:none;padding-bottom:6px;border-bottom:1px solid rgba(0,94,159,.1);margin-bottom:2px}.panel-hdr:active{cursor:grabbing}
.panel-hdr-title{font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px}
.panel-close{background:none;border:none;font-size:14px;cursor:pointer;color:#5a7a9a;
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.panel-close:hover{background:rgba(0,94,159,.1)}
.magic-btn{background:linear-gradient(135deg,#fdc003,#ff8c00);color:#1a2a3a;border:none;
  border-radius:14px;padding:11px 8px;font-weight:800;font-size:12px;cursor:pointer;
  font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 2px 10px rgba(253,192,3,.35);transition:transform .12s}
.magic-btn:active{transform:scale(.94)}
#photo-count{font-size:11px;color:#7a9ab0;text-align:center}
#photos-list{display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1}
#photos-empty{color:#7a9ab0;font-size:11px;text-align:center;padding:12px 4px;line-height:1.9}
.photo-thumb{position:relative;border-radius:11px;overflow:hidden;cursor:grab;
  border:2.5px solid transparent;flex-shrink:0;transition:border .1s}
.photo-thumb:hover{border-color:rgba(255,0,170,.3)}
.photo-thumb img{width:100%;height:88px;object-fit:cover;display:block;pointer-events:none;user-select:none;transition:transform .15s}
.photo-thumb:hover img{transform:scale(1.03)}
.thumb-del{position:absolute;top:4px;right:4px;background:rgba(183,0,73,.9);border:none;
  border-radius:50%;width:22px;height:22px;color:#fff;font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-weight:700}
.thumb-add{position:absolute;bottom:4px;right:4px;background:rgba(255,0,170,.88);border:none;
  border-radius:50%;width:24px;height:24px;color:#fff;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-weight:800;line-height:1}
/* Expandable overlay */
#thumb-expand{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:900;
  align-items:center;justify-content:center;cursor:zoom-out}
#thumb-expand.open{display:flex}
#thumb-expand img{max-width:90vw;max-height:90vh;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.5)}

/* ── RIGHT: Controls ── */
#float-right{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:200;
  display:flex;flex-direction:column;align-items:center;gap:12px}

/* ── BOTTOM: Save + Zoom ── */
#float-bottom{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:200;
  display:flex;align-items:center;gap:10px}
/* Big save button */
#save-btn{background:#005e9f;color:#fff;border:none;border-radius:999px;
  padding:18px 36px;font-weight:800;font-size:18px;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:9px;box-shadow:0 4px 20px rgba(0,94,159,.4);
  transition:transform .12s,box-shadow .12s}
#save-btn:hover{transform:scale(1.06);box-shadow:0 6px 26px rgba(0,94,159,.5)}
#save-btn:active{transform:scale(.95)}
/* Zoom */
.zoom-wrap{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.88);
  backdrop-filter:blur(12px);border-radius:999px;padding:10px 16px;
  box-shadow:0 3px 14px rgba(0,0,0,.14)}
#zoom-slider{-webkit-appearance:none;appearance:none;width:110px;height:6px;border-radius:5px;
  background:linear-gradient(to right,#005e9f 0%,#005e9f var(--pct,55%),#c8d8e8 var(--pct,55%));
  outline:none;cursor:pointer}
#zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:#005e9f;box-shadow:0 2px 7px rgba(0,94,159,.4);cursor:grab}
#zoom-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#005e9f;border:none}
.zoom-pct{font-size:15px;font-weight:700;color:#5a7a9a;min-width:46px}

/* ── Item toolbar ── */
#item-tb{display:none;position:fixed;bottom:86px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.97);backdrop-filter:blur(14px);border-radius:999px;
  padding:8px 16px;box-shadow:0 4px 22px rgba(0,94,159,.16);align-items:center;gap:8px;z-index:200}
#item-tb.open{display:flex}
.itb-btn{width:62px;height:62px;border-radius:50%;border:none;background:rgba(0,94,159,.09);
  color:#005e9f;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;
  transition:transform .12s;flex-shrink:0}
.itb-btn:hover{background:rgba(0,94,159,.16);transform:scale(1.09)}
.itb-btn:active{transform:scale(.9)}
.itb-btn.danger{background:rgba(183,0,73,.09);color:#b70049}
.itb-sep{width:1px;height:26px;background:rgba(0,94,159,.15);margin:0 2px}
#color-area{position:relative}
#color-picker{display:none;position:absolute;bottom:56px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.97);border-radius:16px;padding:10px;gap:6px;flex-wrap:wrap;
  width:152px;box-shadow:0 4px 20px rgba(0,94,159,.18);z-index:300}
#color-picker.open{display:flex}
.color-sw{width:26px;height:26px;border-radius:50%;border:2px solid rgba(0,0,0,.15);
  cursor:pointer;transition:transform .1s;flex-shrink:0}
.color-sw:hover{transform:scale(1.18)}

/* Toast */
#toast{position:fixed;bottom:160px;left:50%;transform:translateX(-50%) translateY(30px);
  background:rgba(0,20,50,.84);color:#fdc003;border-radius:999px;padding:9px 20px;
  font-size:13px;font-weight:700;pointer-events:none;z-index:1000;
  transition:transform .3s,opacity .3s;opacity:0;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── Supabase folder picker modal ── */
#sb-picker{display:none;position:fixed;inset:0;background:rgba(0,10,30,.82);z-index:900;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
#sb-picker.open{display:flex}
.sb-box{background:rgba(255,255,255,.97);border-radius:24px;padding:28px;width:92%;max-width:720px;max-height:88vh;display:flex;flex-direction:column;gap:16px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.sb-head{display:flex;align-items:center;justify-content:space-between}
.sb-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:17px;color:#1a2a3a}
.sb-close{background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1;padding:4px}
.sb-folders{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;overflow-y:auto;flex:1}
.sb-folder-btn{background:#f0f6ff;border:2px solid #d0e4f8;border-radius:16px;padding:18px 12px;cursor:pointer;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:#1a2a3a;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:8px}
.sb-folder-btn:hover{background:#d9eeff;border-color:#005e9f;transform:scale(1.04)}
.sb-folder-icon{font-size:32px}
.sb-folder-count{font-size:11px;font-weight:600;color:#7a9ab0}
.sb-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;overflow-y:auto;flex:1}
.sb-photo{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:1;cursor:pointer;border:3px solid transparent;transition:border .12s}
.sb-photo.sel{border-color:#ff00aa;box-shadow:0 0 0 4px rgba(255,0,170,.2)}
.sb-photo img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.sb-photo-chk{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.9);border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#ff00aa;pointer-events:none}
.sb-photo.sel .sb-photo-chk{background:#ff00aa;border-color:#ff00aa;color:#fff}
.sb-back{background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#005e9f;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:5px}
.sb-info{font-size:12px;color:#7a9ab0;text-align:center}
.sb-pridat{background:#ff00aa;color:#fff;border:none;border-radius:999px;padding:14px 32px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:transform .12s,box-shadow .12s;box-shadow:0 4px 18px rgba(255,0,170,.35)}
.sb-pridat:hover{transform:scale(1.06);box-shadow:0 6px 24px rgba(255,0,170,.45)}
.sb-pridat:disabled{opacity:.4;cursor:default;transform:none}
.sb-loading{text-align:center;padding:40px;color:#7a9ab0;font-size:14px}

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="icon-camera" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M9 7l1.5-2h3L15 7" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="13" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
  <symbol id="icon-pencil" viewBox="0 0 24 24"><path d="M3 21l3-1 12-12-2-2L4 18l-1 3z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M14 4l2 2" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
  <symbol id="icon-transform" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="5" cy="5" r="1.5" fill="currentColor"/><circle cx="19" cy="5" r="1.5" fill="currentColor"/><circle cx="5" cy="19" r="1.5" fill="currentColor"/><circle cx="19" cy="19" r="1.5" fill="currentColor"/></symbol>
  <symbol id="icon-save" viewBox="0 0 24 24"><path d="M4 4h14l2 2v14H4z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M7 4v6h10V4" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="8" y="14" width="8" height="5" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
  <symbol id="icon-folder" viewBox="0 0 24 24"><path d="M3 7h6l2 2h10v8a2 2 0 0 1-2 2H3z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M3 7V5a2 2 0 0 1 2-2h4l2 2" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
  <symbol id="icon-refresh" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7" fill="none" stroke="currentColor" stroke-width="1.8"/><polyline points="21 3 21 9 15 9" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
  <symbol id="icon-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M9 6V4h6v2" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
  <symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M7 11l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 19h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
  <symbol id="icon-fullscreen" viewBox="0 0 24 24"><path d="M4 9V4h5M15 4h5v5M20 15v5h-5M9 20H4v-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="icon-fullscreen-exit" viewBox="0 0 24 24"><path d="M9 4v5H4M20 9h-5V4M15 20v-5h5M4 15h5v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="icon-zoom" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M8 11h6M11 8v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
  <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
  <symbol id="icon-magic" viewBox="0 0 24 24"><path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M19 14l.75 2.25L22 17l-2.25.75L19 20l-.75-2.25L16 17l2.25-.75z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></symbol>
  <symbol id="icon-expand" viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
</svg>

<!-- Logo top-left -->
<div id="float-logo"><img id="logo-img" alt="Včielka"></div>

<!-- Template selector top-right -->
<div id="float-template" style="position:fixed;top:14px;right:14px;z-index:200;display:flex;align-items:center;gap:8px">
  <div id="tpl-thumb-big" onclick="toggleMaskPicker()">
    <img id="mask-thumb" alt="">
  </div>
  <div style="position:relative">
    <button id="tpl-change-btn" onclick="toggleMaskPicker()" title="Zmeniť šablónu">
      <svg style="width:16px;height:16px;display:block"><use href="#icon-transform"/></svg>
    </button>
    <div class="mask-picker" id="mask-picker">
      <div class="picker-title">Vybrať šablónu</div>
      <div id="mask-list"></div>
      <div class="picker-soon">Čoskoro viac šablón…</div>
    </div>
  </div>
</div>

<!-- Main stage (fullscreen canvas) -->
<div id="stage">
  <div id="canvas-wrap">
    <div id="canvas"
         ondragover="event.preventDefault()"
         ondrop="handleDrop(event)"
         onclick="handleCanvasClick(event)">
      <img id="mask-overlay" alt="" draggable="false">
      <svg id="hints-svg" width="900" height="503" style="position:absolute;inset:0;pointer-events:none;z-index:21"></svg>
      <div id="txt-input-wrap">
        <input id="txt-inp" type="text" placeholder="Napíšte text…">
        <div class="txt-hint-bar">Enter – potvrdiť · Esc – zrušiť</div>
      </div>
      <div id="txt-mode-bar">✏ Kliknite na plátno · Esc – zrušiť</div>
    </div>
  </div>
</div>

<!-- Left: photo button + panel -->
<div id="float-photos">
  <button class="fb fb-lg c-magenta" id="pan-btn" onclick="sbOpen()" title="Fotografie z Virtuálnej Školky">
    <svg class="icon"><use href="#icon-plus"/></svg>
  </button>
  <button class="fb fb-sm c-gold" onclick="autoMap()" title="Auto-umiestniť">
    <svg class="icon"><use href="#icon-magic"/></svg>
  </button>

<div id="photos-panel">
  <div class="panel-hdr">
    <span class="panel-hdr-title"><svg class="icon"><use href="#icon-camera"/></svg> Fotografie</span><span style="font-size:18px;color:#c0ccd8;letter-spacing:2px;margin-right:4px">⠿</span>

<!-- Right: utility buttons -->
<div id="float-right">
  <button class="fb fb-sm c-white" onclick="saveProj()" title="Uložiť projekt">
    <svg class="icon"><use href="#icon-save"/></svg>
  </button>
  <button class="fb fb-sm c-white" onclick="document.getElementById('load-inp').click()" title="Načítať projekt">
    <svg class="icon"><use href="#icon-folder"/></svg>
  </button>
  <button class="fb fb-sm c-danger" id="del-btn" style="display:none" onclick="deleteSelected()" title="Odstrániť">
    <svg class="icon"><use href="#icon-trash"/></svg>
  </button>
  <button class="fb fb-sm c-danger" onclick="clearAll()" title="Vymazať plátno">
    <svg class="icon"><use href="#icon-refresh"/></svg>
  </button>
  <button class="fb fb-sm c-white" id="fs-btn" onclick="toggleFullscreen()" title="Celá obrazovka">

const CW=900,CH=503,SNAP_D=72;
const COLORS=['#ffffff','#000000','#fdc003','#005e9f','#b70049','#ff00aa','#ff6b35','#3cd6a0','#ffe066','#a78bfa'];

/* Mask has real RGBA alpha from Photoshop — use directly, zero processing */
async function buildMaskSrc(src){ return src; }

const MASKS_DEF=[{id:0,name:'Maska 1',raw:RAW_MASK,thumb:THUMB_SRC,bg:'#9aaabb',frames:[
  {id:"f1",x:430,y:62, w:89, h:117},
  {id:"f2",x:237,y:105,w:105,h:106},
  {id:"f3",x:590,y:129,w:129,h:91 },
  {id:"f4",x:410,y:248,w:101,h:151},
  {id:"f5",x:204,y:299,w:129,h:87 },
  {id:"f6",x:587,y:293,w:116,h:81 }
]}];
let MASKS=[];
let photos=[],items=[],selId=null,maskIdx=0;
let panOpen=false,txtMode=false,txtPos=null,moving=null;
let zoomPct=100;
let idC=0;
const uid=()=>`i${++idC}_${Date.now()}`;
const mask=()=>MASKS[maskIdx]||MASKS_DEF[maskIdx];
const getItem=id=>items.find(i=>i.id===id);
const getSel=()=>getItem(selId);

function toast(msg,ms=2200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}
function c2c(cx,cy){const r=document.getElementById('canvas').getBoundingClientRect();return{x:(cx-r.left)*CW/r.width,y:(cy-r.top)*CH/r.height};}

function applyScale(){
  const vw=window.innerWidth,vh=window.innerHeight;
  // fitScale = scale where canvas exactly fits viewport (100% = fit to screen)
  const fitScale=Math.min(vw/CW,vh/CH);
  const sc=fitScale*(zoomPct/100);
  const canv=document.getElementById('canvas');
  const cw=document.getElementById('canvas-wrap');
  const stage=document.getElementById('stage');
  // actual pixel footprint after scale
  const sw=Math.round(CW*sc), sh=Math.round(CH*sc);
  cw.style.width=sw+'px'; cw.style.height=sh+'px';
  cw.style.minWidth=sw+'px'; cw.style.minHeight=sh+'px';
  canv.style.transform=`scale(${sc})`;
  // centre in stage when smaller than viewport
  const px=Math.max(40,Math.round((vw-sw)/2));
  const py=Math.max(40,Math.round((vh-sh)/2));
  stage.style.padding=`${py}px ${px}px`;
}
function handleZoom(val){
  zoomPct=parseInt(val);
  document.getElementById('zoom-pct').textContent=zoomPct+'%';
  const pct=((zoomPct-40)/(250-40)*100).toFixed(1);
  document.getElementById('zoom-slider').style.setProperty('--pct',pct+'%');
  applyScale();
}
window.addEventListener('resize',applyScale);

function toggleFullscreen(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});document.getElementById('fs-btn').querySelector('use').setAttribute('href','#icon-fullscreen-exit');}
  else{document.exitFullscreen();document.getElementById('fs-btn').querySelector('use').setAttribute('href','#icon-fullscreen');}
}
document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement)document.getElementById('fs-btn').querySelector('use').setAttribute('href','#icon-fullscreen');setTimeout(applyScale,100);});

function bestSnap(mx,my){let best=null,bd=SNAP_D;mask().frames.forEach(f=>{const d=Math.hypot(mx-(f.x+f.w/2),my-(f.y+f.h/2));if(d<bd){best=f;bd=d;}});return best;}

function autoMap(){
  if(!photos.length){toast('Najprv nahrajte fotografie!');return;}
  const frames=mask().frames;
  const occ=new Set(items.filter(i=>i.type==='photo').map(it=>{const cx=it.x+it.w/2,cy=it.y+it.h/2;const f=frames.find(f=>cx>f.x&&cx<f.x+f.w&&cy>f.y&&cy<f.y+f.h);return f?f.id:null;}).filter(Boolean));
  const free=frames.filter(f=>!occ.has(f.id));if(!free.length){toast('Všetky rámčeky sú obsadené!');return;}
  const used=new Set(items.filter(i=>i.type==='photo').map(i=>i.photoId));
  let pool=photos.filter(p=>!used.has(p.id));if(!pool.length)pool=[...photos];
  let placed=0;
  free.forEach((f,i)=>{const ph=pool[i%pool.length];const ni={id:uid(),type:'photo',src:ph.src,photoId:ph.id,rot:0,x:f.x,y:f.y,w:f.w,h:f.h};items.push(ni);mkPhoto(ni);placed++;});
  updateHints();toast(`✨ ${placed} fotografi${placed===1?'a':'í'} umiestnených!`);
}
function tapPlace(pid){
  const ph=photos.find(p=>p.id===pid);if(!ph)return;
  const frames=mask().frames;
  const occ=new Set(items.filter(i=>i.type==='photo').map(it=>{const cx=it.x+it.w/2,cy=it.y+it.h/2;const f=frames.find(f=>cx>f.x&&cx<f.x+f.w&&cy>f.y&&cy<f.y+f.h);return f?f.id:null;}).filter(Boolean));
  const f=frames.find(fr=>!occ.has(fr.id));
  if(!f){toast('Všetky rámčeky sú obsadené!');return;}
  const ni={id:uid(),type:'photo',src:ph.src,photoId:ph.id,rot:0,x:f.x,y:f.y,w:f.w,h:f.h};
  items.push(ni);mkPhoto(ni);setSel(ni.id);updateHints();toast('Fotografia pridaná!');
}

function handleUpload(e){
  Array.from(e.target.files||[]).slice(0,10-photos.length).forEach(f=>{const fr=new FileReader();fr.onload=ev=>{photos.push({id:uid(),src:ev.target.result,name:f.name});renderPanel();};fr.readAsDataURL(f);});
  e.target.value='';
}

function togglePanel(){
  panOpen=!panOpen;
  document.getElementById('photos-panel').classList.toggle('open',panOpen);
  document.getElementById('pan-btn').style.background=panOpen?'#cc0088':'#ff00aa';
  if(panOpen) document.getElementById('up-inp').click();
}

function renderPanel(){
  document.getElementById('photo-count').textContent=`${photos.length}/10 fotografií`;
  document.getElementById('photos-empty').style.display=photos.length?'none':'block';
  const list=document.getElementById('photos-list');list.innerHTML='';
  photos.forEach(ph=>{
    const d=document.createElement('div');d.className='photo-thumb';d.draggable=true;
    d.ondragstart=()=>window._did=ph.id;d.ondragend=()=>window._did=null;
    d.innerHTML=`
      <img src="${ph.src}" alt="" onclick="expandThumb('${ph.src}')" style="cursor:zoom-in">
      <button class="thumb-del" onclick="removePhoto('${ph.id}')">✕</button>
      <button class="thumb-add" onclick="tapPlace('${ph.id}')">+</button>`;
    list.appendChild(d);
  });
}

function expandThumb(src){
  document.getElementById('thumb-expand-img').src=src;
  document.getElementById('thumb-expand').classList.add('open');
}
function closeExpand(){document.getElementById('thumb-expand').classList.remove('open');}

function removePhoto(pid){photos=photos.filter(p=>p.id!==pid);items.filter(i=>i.photoId===pid).forEach(i=>{const el=document.getElementById(i.id);if(el)el.remove();});items=items.filter(i=>i.photoId!==pid);if(selId&&!getItem(selId))setSel(null);renderPanel();updateHints();}

function handleDrop(e){
  e.preventDefault();if(!window._did)return;
  const ph=photos.find(p=>p.id===window._did);if(!ph)return;
  const{x,y}=c2c(e.clientX,e.clientY);const snap=bestSnap(x,y);const W=160,H=120;
  const ni={id:uid(),type:'photo',src:ph.src,photoId:ph.id,rot:0,x:snap?snap.x:Math.max(0,x-W/2),y:snap?snap.y:Math.max(0,y-H/2),w:snap?snap.w:W,h:snap?snap.h:H};
  items.push(ni);mkPhoto(ni);setSel(ni.id);window._did=null;updateHints();
}

function mkPhoto(it){
  const el=document.createElement('div');el.id=it.id;el.className='placed-photo';
  el.style.cssText=`left:${it.x}px;top:${it.y}px;width:${it.w}px;height:${it.h}px;transform:rotate(${it.rot||0}deg);z-index:${items.length+1};overflow:hidden;cursor:grab;`;
  el.innerHTML=`<img src="${it.src}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;user-select:none;">`;
  el.onmousedown=ev=>startMove(ev,it.id);
  el.addEventListener('touchstart',ev=>touchStart(ev,it.id),{passive:false});
  document.getElementById('canvas').insertBefore(el,document.getElementById('mask-overlay'));
  return el;
}
function mkText(it){
  const el=document.createElement('div');el.id=it.id;el.className='placed-text';
  el.style.cssText=`left:${it.x}px;top:${it.y}px;font-size:${it.fontSize}px;color:${it.color};transform:rotate(${it.rot||0}deg);transform-origin:left top;z-index:35;cursor:grab;`;
  el.textContent=it.text;el.onmousedown=ev=>startMove(ev,it.id);
  document.getElementById('canvas').appendChild(el);return el;
}

function setSel(id){
  if(selId){const p=document.getElementById(selId);if(p){p.style.outline='none';p.style.boxShadow='none';}}
  selId=id;document.getElementById('del-btn').style.display=id?'flex':'none';
  if(id){const el=document.getElementById(id);if(el){el.style.outline='3px solid #ff00aa';el.style.outlineOffset='2px';el.style.boxShadow='0 0 0 6px rgba(255,0,170,.2)';}document.getElementById('item-tb').classList.add('open');document.getElementById('color-area').style.display=(getSel()&&getSel().type==='text')?'block':'none';}
  else{document.getElementById('item-tb').classList.remove('open');document.getElementById('color-picker').classList.remove('open');}
}

function handleCanvasClick(e){
  const cv=document.getElementById('canvas');
  if(e.target!==cv&&e.target.id!=='mask-overlay'&&!e.target.closest('#hints-svg'))return;
  setSel(null);document.getElementById('mask-picker').classList.remove('open');
  if(txtMode){const{x,y}=c2c(e.clientX,e.clientY);txtPos={x,y};const w=document.getElementById('txt-input-wrap');w.style.left=x+'px';w.style.top=y+'px';w.classList.add('open');document.getElementById('txt-inp').value='';setTimeout(()=>document.getElementById('txt-inp').focus(),30);setTxtMode(false);}
  else if(txtPos){cancelTxt();}

function drawCover(ctx,img,dx,dy,dw,dh,rot){
  ctx.save();ctx.translate(dx+dw/2,dy+dh/2);if(rot)ctx.rotate(rot*Math.PI/180);
  const iw=img.naturalWidth||img.width,ih=img.naturalHeight||img.height;
  const sc=Math.max(dw/iw,dh/ih);ctx.drawImage(img,-iw*sc/2,-ih*sc/2,iw*sc,ih*sc);
  ctx.restore();
}
async function saveJPG(){
  const m=mask(),sc=2;const cv2=document.createElement('canvas');cv2.width=CW*sc;cv2.height=CH*sc;const ctx=cv2.getContext('2d');ctx.scale(sc,sc);
  ctx.fillStyle=m.bg;ctx.fillRect(0,0,CW,CH);
  for(const it of items.filter(i=>i.type==='photo')){
    const img=new Image();await new Promise(r=>{img.onload=r;img.src=it.src;});
    ctx.save();ctx.beginPath();if(it.rot){const cx=it.x+it.w/2,cy=it.y+it.h/2,hw=it.w/2,hh=it.h/2,a=it.rot*Math.PI/180;const c=[[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].map(([px,py])=>[cx+px*Math.cos(a)-py*Math.sin(a),cy+px*Math.sin(a)+py*Math.cos(a)]);ctx.moveTo(c[0][0],c[0][1]);c.slice(1).forEach(([x,y])=>ctx.lineTo(x,y));}else{ctx.rect(it.x,it.y,it.w,it.h);}ctx.clip();drawCover(ctx,img,it.x,it.y,it.w,it.h,it.rot||0);ctx.restore();
  }
  const mImg=new Image();await new Promise(r=>{mImg.onload=r;mImg.src=m.processed;});ctx.drawImage(mImg,0,0,CW,CH);
  for(const it of items.filter(i=>i.type==='text')){ctx.save();ctx.translate(it.x,it.y);ctx.rotate((it.rot||0)*Math.PI/180);ctx.fillStyle=it.color||'#fff';ctx.font=`800 ${it.fontSize||28}px 'Plus Jakarta Sans',sans-serif`;ctx.fillText(it.text,0,0);ctx.restore();}
  // ── Watermark logo (upper-right corner, only in exported JPG) ──
  try{
    const logoImg=new Image();
    await new Promise(r=>{logoImg.onload=r;logoImg.onerror=r;logoImg.src=LOGO_SRC;});
    if(logoImg.naturalWidth){
      const pad=24, circleR=64, cx=CW-pad-circleR, cy=pad+circleR;
      // yellow circle badge
      ctx.save();
      ctx.beginPath();ctx.arc(cx,cy,circleR,0,Math.PI*2);
      ctx.fillStyle='#fdc003';ctx.fill();
      ctx.shadowColor='rgba(0,0,0,0.22)';ctx.shadowBlur=10;ctx.shadowOffsetY=3;
      ctx.fill();
      ctx.restore();
      // logo image clipped to circle
      ctx.save();
      ctx.beginPath();ctx.arc(cx,cy,circleR-4,0,Math.PI*2);ctx.clip();
      const lw=logoImg.naturalWidth,lh=logoImg.naturalHeight;
      const ls=Math.min((circleR*1.6)/lw,(circleR*1.6)/lh);
      ctx.drawImage(logoImg,cx-lw*ls/2,cy-lh*ls/2,lw*ls,lh*ls);
      ctx.restore();
    }
  }catch(e){}
  const a=document.createElement('a');a.download='vcielka_kompozicia.jpg';a.href=cv2.toDataURL('image/jpeg',.93);a.click();
}

function sbTogglePhoto(div, url, name){
  const already = sbSelected.findIndex(s=>s.url===url);
  if(already >= 0){
    sbSelected.splice(already, 1);
    div.classList.remove('sel');
    div.querySelector('.sb-photo-chk').textContent = '';
  } else {
    if(sbSelected.length >= 6){ toast('Maximum 6 fotografi!'); return; }
    sbSelected.push({url, name});
    div.classList.add('sel');
    div.querySelector('.sb-photo-chk').textContent = sbSelected.length;
    // renumber all
    document.querySelectorAll('.sb-photo.sel').forEach((el,i)=>{
      el.querySelector('.sb-photo-chk').textContent = i+1;
    });
  }
  const n = sbSelected.length;
  document.getElementById('sb-sel-count').textContent = n + ' / 6 vybraných';
  document.getElementById('sb-pridat-btn').disabled = n === 0;
}

async function sbImport(){
  if(!sbSelected.length) return;
  let added = 0;
  for(const {url, name} of sbSelected){
    if(photos.length >= 10) break;
    // fetch as blob → dataURL so it works offline too
    try{
      const resp = await fetch(url);
      const blob = await resp.blob();
      await new Promise(res => {
        const fr = new FileReader();
        fr.onload = ev => {
          photos.push({id: uid(), src: ev.target.result, name});
          added++;
          res();
        };
        fr.readAsDataURL(blob);
      });
    }catch(e){
      // fallback: use URL directly
      photos.push({id: uid(), src: url, name});
      added++;
    }
  }
  renderPanel();
  sbClose();
  if(!panOpen) togglePanel();
  toast('✅ ' + added + ' fotografi${added===1?"a":"í"} pridaných!');
}

/* ── Draggable photos panel ── */
(function(){
  const panel = document.getElementById('photos-panel');
  const hdr   = panel.querySelector('.panel-hdr');
  let dragging = false, ox = 0, oy = 0;

  function startDrag(cx, cy){
    dragging = true;
    const r = panel.getBoundingClientRect();
    ox = cx - r.left;
    oy = cy - r.top;
    panel.style.transition = 'none';
    panel.style.transform  = 'none';   // remove the translateY(-50%) centering
    panel.style.top  = r.top  + 'px';
    panel.style.left = r.left + 'px';
    hdr.style.cursor = 'grabbing';
  }
  function moveDrag(cx, cy){
    if(!dragging) return;
    const x = Math.max(0, Math.min(window.innerWidth  - panel.offsetWidth,  cx - ox));
    const y = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, cy - oy));
    panel.style.left = x + 'px';
    panel.style.top  = y + 'px';
  }
  function endDrag(){ dragging = false; hdr.style.cursor = 'grab'; }

  hdr.addEventListener('mousedown',  e => { e.preventDefault(); startDrag(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
  window.addEventListener('mouseup',   endDrag);

  hdr.addEventListener('touchstart',  e => { e.preventDefault(); const t=e.touches[0]; startDrag(t.clientX, t.clientY); }, {passive:false});
  window.addEventListener('touchmove', e => { if(!dragging)return; e.preventDefault(); const t=e.touches[0]; moveDrag(t.clientX,t.clientY); }, {passive:false});
  window.addEventListener('touchend',  endDrag);
})();
